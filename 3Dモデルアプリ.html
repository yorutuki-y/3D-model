<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本格的3Dモデリング＆デザインアプリ</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            user-select: none;
        }

        #canvas-container {
            width: 100vw;
            height: 100vw;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* 制御パネル（左側） */
        .panel {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 320px;
            max-height: 95vh;
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            z-index: 10;
            overflow-y: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        h3 {
            margin-top: 0;
            border-bottom: 2px solid #007acc;
            padding-bottom: 5px;
            color: #007acc;
            font-size: 1.1em;
        }

        .section {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85em;
            margin-bottom: 5px;
            color: #ccc;
        }

        select, input[type="color"], button {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            background: #2d2d2d;
            border: 1px solid #555;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
            cursor: pointer;
            transition: background 0.2s;
        }

        select:focus, button:focus {
            outline: none;
            border-color: #007acc;
        }

        button:hover {
            background: #404040;
        }

        button.primary {
            background: #007acc;
            border: none;
            font-weight: bold;
        }

        button.primary:hover {
            background: #0098ff;
        }

        button.danger {
            background: #a93226;
            border: none;
        }

        button.danger:hover {
            background: #cb4335;
        }

        /* 変形用スライダー */
        .slider-group {
            margin-bottom: 10px;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8em;
            color: #aaa;
        }
        input[type="range"] {
            width: 100%;
            margin-top: 5px;
        }

        /* 操作説明（右下） */
        .instructions {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 0.8em;
            pointer-events: none;
            z-index: 10;
            line-height: 1.4;
            border-left: 3px solid #007acc;
        }

        /* スクロールバーカスタム */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/OBJExporter.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="panel">
        <div class="section">
            <h3>① 形状を追加（多くの形に対応）</h3>
            <label for="shape-select">形を選択:</label>
            <select id="shape-select">
                <option value="box">立方体 (Box)</option>
                <option value="sphere">球体 (Sphere)</option>
                <option value="cylinder">円柱 (Cylinder)</option>
                <option value="cone">コーン (Cone)</option>
                <option value="torus">トーラス / ドーナツ (Torus)</option>
                <option value="capsule">カプセル (Capsule)</option>
                <option value="icosahedron">正二十面体 (Icosahedron)</option>
            </select>
            <button id="add-btn" class="primary">オブジェクトを追加</button>
        </div>

        <div class="section">
            <h3>② 自由に変形・デザイン</h3>
            <p id="no-selection-text" style="font-size:0.85em; color:#888; text-align:center;">画面上のオブジェクトを分解・選択してください</p>
            
            <div id="transform-controls" style="display: none;">
                <label>マテリアルカラー:</label>
                <input type="color" id="obj-color" value="#ffffff">

                <div class="slider-group">
                    <div class="slider-label"><span>幅 / 半径 (Scale X)</span><span id="val-x">1.0</span></div>
                    <input type="range" id="scale-x" min="0.1" max="5" step="0.1" value="1">
                </div>
                <div class="slider-group">
                    <div class="slider-label"><span>高さ (Scale Y)</span><span id="val-y">1.0</span></div>
                    <input type="range" id="scale-y" min="0.1" max="5" step="0.1" value="1">
                </div>
                <div class="slider-group">
                    <div class="slider-label"><span>奥行き (Scale Z)</span><span id="val-z">1.0</span></div>
                    <input type="range" id="scale-z" min="0.1" max="5" step="0.1" value="1">
                </div>

                <div class="slider-group" style="margin-top:15px;">
                    <div class="slider-label"><span>位置 (高さ Y)</span><span id="val-posy">0.0</span></div>
                    <input type="range" id="pos-y" min="-5" max="5" step="0.1" value="0">
                </div>

                <button id="delete-btn" class="danger" style="margin-top:10px;">選択中のものを削除</button>
            </div>
        </div>

        <div class="section">
            <h3>③ 出力・管理</h3>
            <button id="export-btn" style="background:#28b463; border:none; font-weight:bold; color:white;">3Dモデルをダウンロード (.obj)</button>
            <button id="clear-btn" class="danger">すべてクリア</button>
        </div>
    </div>

    <div class="instructions">
        <strong>【操作方法】</strong><br>
        ・画面ドラッグ: カメラの回転<br>
        ・右ドラッグ / Ctrl+ドラッグ: カメラの平行移動<br>
        ・ホイールスクロール: ズームイン / アウト<br>
        ・オブジェクトをクリック: 選択して変形可能に
    </div>

    <script>
        // --- シーン・カメラ・レンダラーの初期化 ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1e1e1e);

        // グリッド（床面）と軸の表示
        const gridHelper = new THREE.GridHelper(20, 20, 0x007acc, 0x444444);
        gridHelper.position.y = -0.01;
        scene.add(gridHelper);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // カメラコントロール
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 1, 0);

        // --- 照明 (ライティング) ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight1.position.set(10, 15, 10);
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0x90b0ff, 0.3);
        dirLight2.position.set(-10, 10, -10);
        scene.add(dirLight2);

        // --- 管理用変数 ---
        let objectsArray = [];
        let selectedObject = null;
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // UI要素
        const transformControls = document.getElementById('transform-controls');
        const noSelectionText = document.getElementById('no-selection-text');

        // --- 形状作成関数群 ---
        function createGeometry(type) {
            switch(type) {
                case 'box': return new THREE.BoxGeometry(1, 1, 1);
                case 'sphere': return new THREE.SphereGeometry(0.6, 32, 32);
                case 'cylinder': return new THREE.CylinderGeometry(0.5, 0.5, 1.2, 32);
                case 'cone': return new THREE.ConeGeometry(0.6, 1.2, 32);
                case 'torus': return new THREE.TorusGeometry(0.5, 0.2, 16, 100);
                case 'capsule': 
                    // 簡易的なカプセルを円柱と球の組み合わせ、またはシリンダーで代用（標準はCylinderで表現調整）
                    return new THREE.CylinderGeometry(0.4, 0.4, 1, 32); 
                case 'icosahedron': return new THREE.IcosahedronGeometry(0.6, 0);
                default: return new THREE.BoxGeometry(1, 1, 1);
            }
        }

        // オブジェクト追加イベント
        document.getElementById('add-btn').addEventListener('click', () => {
            const shapeType = document.getElementById('shape-select').value;
            const geometry = createGeometry(shapeType);
            
            // 本格的な質感を出すためのマテリアル設定
            const material = new THREE.MeshStandardMaterial({
                color: 0xdddddd,
                roughness: 0.4,
                metalness: 0.1,
                side: THREE.DoubleSide
            });

            const mesh = new THREE.Mesh(geometry, material);
            
            // 初期配置位置を少し上にずらす
            mesh.position.set((Math.random() - 0.5) * 2, 0.6, (Math.random() - 0.5) * 2);
            
            scene.add(mesh);
            objectsArray.push(mesh);
            
            selectObject(mesh); // 追加したものを自動選択
        });

        // --- オブジェクトの選択システム (レイキャスト) ---
        window.addEventListener('pointerdown', (event) => {
            // UIパネル上のクリックは無視する
            if (event.clientX < 340 && event.clientY < window.innerHeight * 0.95) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(objectsArray);

            if (intersects.length > 0) {
                selectObject(intersects[0].object);
            }
        });

        function selectObject(obj) {
            // 前の選択のエッジ光などをリセットしたい場合はここで処理
            if(selectedObject) {
                selectedObject.material.emissive.setHex(0x000000);
            }

            selectedObject = obj;
            // 選択中オブジェクトを分かりやすく発光させる
            selectedObject.material.emissive.setHex(0x222222);

            // UIコントロールの値を現在のオブジェクトに合わせる
            document.getElementById('obj-color').value = "#" + selectedObject.material.color.getHexString();
            
            document.getElementById('scale-x').value = selectedObject.scale.x;
            document.getElementById('scale-y').value = selectedObject.scale.y;
            document.getElementById('scale-z').value = selectedObject.scale.z;
            document.getElementById('pos-y').value = selectedObject.position.y;

            updateSliderLabels();

            // UIを表示
            noSelectionText.style.display = 'none';
            transformControls.style.display = 'block';
        }

        function updateSliderLabels() {
            if(!selectedObject) return;
            document.getElementById('val-x').innerText = Number(selectedObject.scale.x).toFixed(1);
            document.getElementById('val-y').innerText = Number(selectedObject.scale.y).toFixed(1);
            document.getElementById('val-z').innerText = Number(selectedObject.scale.z).toFixed(1);
            document.getElementById('val-posy').innerText = Number(selectedObject.position.y).toFixed(1);
        }

        // --- 変形スライダー・色の連動設定 ---
        document.getElementById('obj-color').addEventListener('input', (e) => {
            if (selectedObject) selectedObject.material.color.set(e.target.value);
        });
        document.getElementById('scale-x').addEventListener('input', (e) => {
            if (selectedObject) { selectedObject.scale.x = parseFloat(e.target.value); updateSliderLabels(); }
        });
        document.getElementById('scale-y').addEventListener('input', (e) => {
            if (selectedObject) { selectedObject.scale.y = parseFloat(e.target.value); updateSliderLabels(); }
        });
        document.getElementById('scale-z').addEventListener('input', (e) => {
            if (selectedObject) { selectedObject.scale.z = parseFloat(e.target.value); updateSliderLabels(); }
        });
        document.getElementById('pos-y').addEventListener('input', (e) => {
            if (selectedObject) { selectedObject.position.y = parseFloat(e.target.value); updateSliderLabels(); }
        });

        // 削除機能
        document.getElementById('delete-btn').addEventListener('click', () => {
            if (selectedObject) {
                scene.remove(selectedObject);
                objectsArray = objectsArray.filter(item => item !== selectedObject);
                selectedObject = null;
                transformControls.style.display = 'none';
                noSelectionText.style.display = 'block';
            }
        });

        // クリア機能
        document.getElementById('clear-btn').addEventListener('click', () => {
            objectsArray.forEach(obj => scene.remove(obj));
            objectsArray = [];
            selectedObject = null;
            transformControls.style.display = 'none';
            noSelectionText.style.display = 'block';
        });

        // --- 高度な機能：OBJダウンロード (エクスポート) ---
        document.getElementById('export-btn').addEventListener('click', () => {
            if(objectsArray.length === 0) {
                alert("エクスポートするオブジェクトがシーン内にありません。");
                return;
            }

            // 選択ハイライト（発光）を一時的に消して出力する
            if(selectedObject) selectedObject.material.emissive.setHex(0x000000);

            // 一時的にグリッドを非表示にする（モデルだけを書き出すため）
            scene.remove(gridHelper);

            const exporter = new THREE.OBJExporter();
            const result = exporter.parse(scene);

            // グリッドとハイライトを戻す
            scene.add(gridHelper);
            if(selectedObject) selectedObject.material.emissive.setHex(0x222222);

            // ファイルダウンロードの処理
            const blob = new Blob([result], { type: 'text/plain' });
            const link = document.createElement('a');
            link.style.display = 'none';
            document.body.appendChild(link);
            
            link.href = URL.createObjectURL(blob);
            link.download = 'my_3d_design.obj'; // Blenderや各種3Dソフトで開けるファイル
            link.click();
            
            document.body.removeChild(link);
        });

        // --- リサイズ対応 ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- アニメーションループ ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

    </script>
</body>
</html>
